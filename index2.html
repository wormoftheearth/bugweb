<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 2</title>

<style>
body {
    background-image: url("web.jpg");
    background-size: cover;
    background-position: center;
    margin: 0;
    height: 100vh;
    overflow-x: scroll;
    white-space: nowrap;
}

/* SLIDES */
.slide-container {
    display: flex;
    flex-direction: row;
}

.slide {
    width: 100vw;
    height: 100vh;
    position: relative;
    display: inline-block;
}

/* TEXT */
.slide1-content,
.slide2-content {
    position: absolute;
    top: 30%;
    width: 100%;
    text-align: center;
    color: white;
    font-family: Helvetica, sans-serif;
}

/* FLY */
.fly {
    position: absolute;
    top: 60vh;
    left: 60vw;
    width: 200px;
}

/* LINK BACK */
.back {
    position: absolute;
    top: 20px;
    left: 20px;
}

.back a {
    color: white;
    text-decoration: none;
    font-family: Arial;
}
</style>
</head>

<body>

<div class="slide-container">

    <!-- SLIDE 1 -->
    <div class="slide">
        <div class="slide1-content">
            press any<br>
            <span style="font-size:40px;">abcdefghijklmnopqrstuvwxyz</span><br>
            for sound
        </div>

        <img class="fly" src="fly.gif">

        <audio id="bg-audio">
            <source src="flytrap.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- SLIDE 2 -->
    <div class="slide">
        <div class="slide2-content">
            <p style="font-size:24px; font-weight:bold;">
                THE ONLY OTHER<br>
                WHO WILL EVER<br>
                KNOW ME<br>
                LIKE YOU DO<br>
                IS THE INSIDE<br>
                OF YOU<br>
                THAT HAS EATEN ME
            </p>
        </div>

        <img class="fly" src="fly.gif">
    </div>

    <!-- SLIDE 3 -->
    <div class="slide">
        <h1 style="color:white; text-align:center; margin-top:40vh;">
            END
        </h1>

        <div class="back">
            <a href="index.html">← back</a>
        </div>
    </div>

</div>

<script>
const audio = document.getElementById("bg-audio");

document.addEventListener("keydown", function () {
    if (audio.paused) {
        audio.play();
    } else {
        audio.pause();
    }
});
</script>

</body>
</html>
