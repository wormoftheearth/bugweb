<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Title</title>

<style>

/* =====================
   FONTS
===================== */
@font-face {
    font-family: 'anthony';
    src: url('font/Anthony.woff') format('woff'),
         url('font/Anthony.woff2') format('woff2');
}

/* =====================
   GLOBAL LAYOUT
===================== */
body {
    margin: 0;
    height: 100vh;
    width: 400vw;
    background-image: url("web.jpg");
    background-size: 100% 100%;
}

/* =====================
   SLIDES
===================== */
.slide-container {
    display: flex;
    flex-direction: row;
    position: relative;
}

.slide1,
.slide2,
.slide3 {
    width: 100vw;
    position: relative;
}

/* =====================
   SHARED ELEMENTS
===================== */
.fly {
    position: absolute;
    top: 60vh;
    left: 60vw;
    width: 200px;
}

/* =====================
   TEXT
===================== */
.slide1-content p,
.slide2-content p {
    font-family: Helvetica, sans-serif;
    font-size: 24px;
}

.slide2-content p {
    color: white;
    font-weight: bold;
}

/* =====================
   LINKS
===================== */
.slide3 h1 a {
    color: white;
    text-decoration: none;
}

</style>
</head>

<body>

<div class="slide-container">

    <!-- SLIDE 1 -->
    <div class="slide1">

        <div class="slide1-content">
            <p>
                press any<br>
                <span style="font-size: 40px;">abcdefghijklmnopqrstuvwxyz</span><br>
                for sound
            </p>
        </div>

        <audio id="bg-audio">
            <source src="flytrap.mp3" type="audio/mpeg">
        </audio>

        <img class="fly" src="fly.gif">

    </div>

    <!-- SLIDE 2 -->
    <div class="slide2">

        <div class="slide2-content">
            <p>
                THE ONLY OTHER<br>
                WHO WILL EVER<br>
                KNOW ME<br>
                LIKE YOU DO<br>
                IS THE INSIDE<br>
                OF YOU<br>
                THAT HAS EATEN ME
            </p>
        </div>

        <img class="fly" src="fly.gif">

    </div>

    <!-- SLIDE 3 -->
    <div class="slide3">

        <h1>
            <a href="index2.html">This link goes to page 2</a>
        </h1>

        <h2>secondary heading</h2>
        <p>paragraph</p>

    </div>

</div>

<!-- =====================
     JAVASCRIPT (FIXED)
===================== -->
<script>
let scrollSpeed = 1;
let isScrolling = true;

function autoScroll() {
    if (isScrolling) {
        window.scrollBy(scrollSpeed, 0);
    }
    requestAnimationFrame(autoScroll);
}

window.addEventListener("load", () => {
    requestAnimationFrame(autoScroll);
});

// click to pause/resume
window.addEventListener("click", () => {
    isScrolling = !isScrolling;
});
</script>

</body>
</html>
